# Docker Compose 配置
# 基于大语言模型的日志采集聚合与根因分析系统

services:
  # ============================================
  # PostgreSQL 数据库 - 主数据库
  # ============================================
  postgres:
    image: postgres:15
    container_name: loganalysis-postgres
    environment:
      POSTGRES_USER: loganalysis
      POSTGRES_PASSWORD: loganalysis_123456
      POSTGRES_DB: loganalysis
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loganalysis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loganalysis-network

  # ============================================
  # Redis 缓存 - 提升性能
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: loganalysis-redis
    command: redis-server --requirepass loganalysis_123456 --appendonly yes
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "loganalysis_123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loganalysis-network

  # ============================================
  # RabbitMQ 消息队列 - 异步任务处理
  # ============================================
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: loganalysis-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: loganalysis
      RABBITMQ_DEFAULT_PASS: loganalysis_123456
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - loganalysis-network

  # ============================================
  # Elasticsearch - 全文检索和日志分析（可选）
  # ============================================
  elasticsearch:
    image: elasticsearch:8.10.2
    container_name: loganalysis-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - TZ=Asia/Shanghai
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - loganalysis-network

  # ============================================
  # Kibana - Elasticsearch 可视化界面（可选）
  # ============================================
  kibana:
    image: kibana:8.10.2
    container_name: loganalysis-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_PORT=5601
      - TZ=Asia/Shanghai
    ports:
      - "5601:5601"
    restart: unless-stopped
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - loganalysis-network

  # ============================================
  # MinIO - 对象存储（冷数据归档）
  # ============================================
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: loganalysis-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"      # API 端口
      - "9001:9001"      # Console 端口
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - loganalysis-network

volumes:
  # 持久化数据卷
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  rabbitmq_logs:
    driver: local
  elasticsearch_data:
    driver: local
  minio_data:
    driver: local

networks:
  loganalysis-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
