name: Auto Tag From Version

on:
  push:
    branches:
      - main
    paths:
      - 'loganalysis_frontend/src/version.json'

permissions:
  contents: write

concurrency:
  group: auto-tag-from-version-main
  cancel-in-progress: false

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from version.json
        id: version
        shell: bash
        run: |
          VERSION_FILE="loganalysis_frontend/src/version.json"
          TAG=$(jq -r '.version // empty' "$VERSION_FILE")

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "version 字段为空，无法创建 tag"
            exit 1
          fi

          if [[ "$TAG" != v* ]]; then
            TAG="v$TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "将创建并推送 tag: $TAG"

      - name: Check tag exists
        id: exists
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "tag 已存在，跳过创建: $TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "已推送 tag: $TAG"
