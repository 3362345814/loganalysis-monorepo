name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'loganalysis/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'loganalysis/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loganalysis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: loganalysis/pom.xml

      - name: Verify Java version
        run: java -version

      - name: Run tests
        run: mvn -B -ntp test
