name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: vars
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            echo "context=loganalysis" >> "$GITHUB_OUTPUT"
            echo "dockerfile=Dockerfile" >> "$GITHUB_OUTPUT"
            echo "image=ghcr.io/${{ github.repository_owner }}/loganalysis-backend" >> "$GITHUB_OUTPUT"
          else
            echo "context=loganalysis_frontend" >> "$GITHUB_OUTPUT"
            echo "dockerfile=Dockerfile" >> "$GITHUB_OUTPUT"
            echo "image=ghcr.io/${{ github.repository_owner }}/loganalysis-frontend" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.vars.outputs.context }}
          file: ${{ steps.vars.outputs.context }}/${{ steps.vars.outputs.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.vars.outputs.image }}:${{ github.ref_name }}
            ${{ steps.vars.outputs.image }}:latest

  build-cli:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Verify CLI source exists
        run: |
          ls -la
          ls -la cli
          ls -la cli/cmd/loganalysis

      - name: Build CLI
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -buildvcs=false -trimpath \
            -ldflags "-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/loganalysis-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/loganalysis

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/dist/loganalysis-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-images
      - build-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-*
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate checksums
        working-directory: dist
        run: sha256sum loganalysis-* > checksums.txt

      - name: Sign checksums (keyless)
        working-directory: dist
        run: |
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/loganalysis-*
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            scripts/install.sh
            scripts/install.ps1
