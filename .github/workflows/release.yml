name: release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'loganalysis_frontend/src/version.json'

permissions:
  contents: write
  id-token: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(jq -r '.version // empty' loganalysis_frontend/src/version.json)
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::无法解析版本号，请检查 loganalysis_frontend/src/version.json 的 version 字段。"
            exit 1
          fi

          if [[ "$TAG" != v* ]]; then
            TAG="v$TAG"
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

  build-images:
    runs-on: ubuntu-latest
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: vars
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            echo "context=loganalysis" >> "$GITHUB_OUTPUT"
            echo "dockerfile=Dockerfile" >> "$GITHUB_OUTPUT"
            echo "dockerhub_repo=loganalysis-backend" >> "$GITHUB_OUTPUT"
          else
            echo "context=loganalysis_frontend" >> "$GITHUB_OUTPUT"
            echo "dockerfile=Dockerfile" >> "$GITHUB_OUTPUT"
            echo "dockerhub_repo=loganalysis-frontend" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Docker Hub credentials
        shell: bash
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Missing DOCKERHUB_USERNAME or DOCKERHUB_TOKEN repository secrets."
            exit 1
          fi

      - name: Resolve Docker Hub namespace
        id: dockerhub
        shell: bash
        run: |
          login_username="$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr -d '[:space:]')"
          if [ -z "$login_username" ]; then
            echo "::error::DOCKERHUB_USERNAME is empty."
            exit 1
          fi

          raw_namespace="${{ vars.DOCKERHUB_NAMESPACE }}"
          if [ -z "$raw_namespace" ]; then
            raw_namespace="$login_username"
          fi
          namespace="$(echo "$raw_namespace" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"

          if [ -z "$namespace" ]; then
            echo "::error::Docker Hub namespace resolved to empty. Set repository variable DOCKERHUB_NAMESPACE or fix DOCKERHUB_USERNAME."
            exit 1
          fi

          if ! [[ "$namespace" =~ ^[a-z0-9]+([._-][a-z0-9]+)*$ ]]; then
            echo "::error::Invalid Docker Hub namespace '$namespace'. Use lowercase letters, numbers, dot, underscore, dash only."
            echo "::error::Do not use email as namespace. You can set repository variable DOCKERHUB_NAMESPACE explicitly."
            exit 1
          fi

          echo "login_username=$login_username" >> "$GITHUB_OUTPUT"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub.outputs.login_username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image (Docker Hub)
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.vars.outputs.context }}
          file: ${{ steps.vars.outputs.context }}/${{ steps.vars.outputs.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.io/${{ steps.dockerhub.outputs.namespace }}/${{ steps.vars.outputs.dockerhub_repo }}:${{ needs.resolve-release.outputs.release_tag }}
            docker.io/${{ steps.dockerhub.outputs.namespace }}/${{ steps.vars.outputs.dockerhub_repo }}:latest

  build-cli:
    runs-on: ubuntu-latest
    needs: resolve-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Verify CLI source exists
        run: |
          ls -la
          ls -la cli
          ls -la cli/cmd/loganalysis

      - name: Build CLI
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -buildvcs=false -trimpath \
            -ldflags "-s -w -X main.version=${{ needs.resolve-release.outputs.release_tag }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/loganalysis-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/loganalysis

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/dist/loganalysis-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - build-images
      - build-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cli-*
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate checksums
        working-directory: dist
        run: sha256sum loganalysis-* > checksums.txt

      - name: Sign checksums (keyless)
        working-directory: dist
        run: |
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt

      - name: Generate release notes from version.json
        id: release_notes
        shell: bash
        run: |
          VERSION_FILE="loganalysis_frontend/src/version.json"

          mapfile -t updates < <(jq -r '
            .updateInfo as $u
            | if $u == null then empty
              elif ($u | type) == "array" then $u[]
              else ($u | tostring | split("\n")[])
              end
            | gsub("^\\s+|\\s+$"; "")
            | select(length > 0)
          ' "$VERSION_FILE")

          if [ ${#updates[@]} -eq 0 ]; then
            notes="1. 无更新说明"
          else
            notes=""
            for i in "${!updates[@]}"; do
              idx=$((i + 1))
              notes+="${idx}. ${updates[$i]}"$'\n'
            done
            notes="${notes%$'\n'}"
          fi

          {
            echo "body<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.release_tag }}
          name: ${{ needs.resolve-release.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            dist/loganalysis-*
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            scripts/install.sh
            scripts/install.ps1
